<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>HMI·GEN v12 — 测试用例自动生成系统</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1A6FD4;--primary-hover:#3a87e0;--primary-subtle:rgba(26,111,212,0.08);
  --success:#0D9B60;--success-subtle:rgba(13,155,96,0.10);
  --warning:#C47E00;--warning-subtle:rgba(196,126,0,0.10);
  --error:#D93025;--error-subtle:rgba(217,48,37,0.08);
  --bg-page:#F0F4F8;--bg-card:#FFFFFF;--bg-elevated:#F7FAFC;--bg-hover:#EBF2FA;
  --border:#E1E8F0;--border-strong:#CBD8E6;
  --text-main:#1A2B3C;--text-secondary:#4A6A8A;--text-light:#8AAAC4;--text-disabled:#B8C8D8;
  --font:"Noto Sans SC","PingFang SC",-apple-system,sans-serif;
  --mono:"SF Mono","Fira Code",Consolas,monospace;
  --fs-h2:18px;--fs-h3:15px;--fs-body:13px;--fs-small:12px;--fs-tiny:11px;
  --r-sm:4px;--r-md:8px;--r-lg:12px;
  --shadow-xs:0 1px 2px rgba(26,111,212,0.04);
  --shadow-sm:0 2px 6px rgba(26,111,212,0.06);
  --shadow-md:0 4px 14px rgba(26,111,212,0.08);
  --sidebar-w:220px;--header-h:56px;
  --t:0.22s cubic-bezier(0.4,0,0.2,1);
}
html{font-size:14px}
body{font-family:var(--font);font-size:var(--fs-body);color:var(--text-main);background:var(--bg-page);min-height:100vh;display:flex;overflow:hidden}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
button{font-family:var(--font);cursor:pointer}

/* ===== SIDEBAR ===== */
.sidebar{width:var(--sidebar-w);height:100vh;background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:100;position:relative}
.sidebar-brand{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;position:relative}
.sidebar-brand::after{content:'';position:absolute;bottom:-1px;left:20px;width:36px;height:2px;background:var(--primary);border-radius:1px}
.brand-icon{width:32px;height:32px;border-radius:7px;background:linear-gradient(135deg,var(--primary),#3a87e0);display:grid;place-items:center;color:#fff;font-weight:700;font-size:13px;letter-spacing:-0.5px;flex-shrink:0;box-shadow:0 2px 8px rgba(26,111,212,0.3)}
.brand-text h1{font-size:14px;font-weight:700;letter-spacing:0.05em;color:var(--text-main)}
.brand-text h1 em{font-style:normal;color:var(--primary)}
.brand-text span{font-size:10px;color:var(--text-light);letter-spacing:0.08em;font-family:var(--mono);display:block;margin-top:1px}

.sidebar-section{padding:14px 8px 6px;font-size:10px;letter-spacing:0.15em;color:var(--text-light);font-family:var(--mono);text-transform:uppercase}
.sidebar-nav{padding:0 8px;display:flex;flex-direction:column;gap:1px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-sm);color:var(--text-secondary);font-size:var(--fs-body);transition:var(--t);position:relative;text-decoration:none;cursor:pointer}
.nav-item:hover{background:var(--bg-hover);color:var(--primary)}
.nav-item.active{background:var(--primary-subtle);color:var(--primary);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:7px;bottom:7px;width:3px;background:var(--primary);border-radius:0 2px 2px 0}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:0.7;display:grid;place-items:center;font-size:14px}
.nav-item.active .nav-icon,.nav-item:hover .nav-icon{opacity:1}
.nav-badge{margin-left:auto;font-size:10px;padding:0 7px;border-radius:9px;line-height:18px;min-width:20px;text-align:center;font-weight:600}
.nav-badge.primary{background:var(--primary-subtle);color:var(--primary)}
.nav-badge.warning{background:var(--warning-subtle);color:var(--warning)}
.nav-badge.error{background:var(--error-subtle);color:var(--error)}
.sidebar-footer{margin-top:auto;padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:var(--fs-small);color:var(--text-light)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--success);animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.5}}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.header{height:var(--header-h);padding:0 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);flex-shrink:0;z-index:10}
.header-left h2{font-size:var(--fs-h2);font-weight:700;color:var(--text-main)}
.breadcrumb{font-size:var(--fs-small);color:var(--text-light);display:flex;align-items:center;gap:6px;margin-top:2px}
.breadcrumb b{color:var(--text-secondary);font-weight:500}
.header-right{display:flex;align-items:center;gap:10px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;height:30px;padding:0 14px;font-size:var(--fs-body);font-family:var(--font);border-radius:var(--r-sm);transition:var(--t);white-space:nowrap;border:1px solid var(--border-strong);background:var(--bg-card);color:var(--text-secondary)}
.btn:hover{border-color:var(--primary);color:var(--primary);box-shadow:var(--shadow-sm)}
.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:0 2px 6px rgba(26,111,212,0.25)}
.btn-primary:hover{background:var(--primary-hover);color:#fff}
.btn-success{background:var(--success);border-color:var(--success);color:#fff}
.btn-success:hover{background:#11b370;color:#fff}
.btn-danger{border-color:var(--error);color:var(--error)}
.btn-danger:hover{background:var(--error-subtle);color:var(--error)}
.btn-sm{height:26px;padding:0 10px;font-size:var(--fs-small)}
.btn-ghost{border-color:transparent;background:transparent}
.btn-ghost:hover{background:var(--bg-hover);border-color:transparent}
.avatar{width:30px;height:30px;border-radius:6px;background:linear-gradient(135deg,var(--primary),#4dabff);display:grid;place-items:center;font-size:11px;font-weight:600;color:#fff}

.page-content{flex:1;overflow-y:auto;padding:20px 24px}
.page{display:none;animation:pageIn 0.3s ease}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ===== CARDS / SHARED ===== */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--shadow-xs)}
.card-pad{padding:16px 20px}
.card-h{font-size:var(--fs-h3);font-weight:700;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-h small{font-size:var(--fs-small);font-weight:400;color:var(--text-light)}
.tag{display:inline-flex;align-items:center;font-size:var(--fs-tiny);padding:1px 8px;border-radius:10px;line-height:18px;font-weight:500}
.tag-blue{background:var(--primary-subtle);color:var(--primary)}
.tag-green{background:var(--success-subtle);color:var(--success)}
.tag-amber{background:var(--warning-subtle);color:var(--warning)}
.tag-red{background:var(--error-subtle);color:var(--error)}
.tag-gray{background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--border)}
.mono{font-family:var(--mono)}

/* ===== STAT GRID ===== */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:16px 18px;position:relative;overflow:hidden;box-shadow:var(--shadow-xs);transition:var(--t);cursor:pointer}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:rgba(26,111,212,0.2)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--primary-hover))}
.stat-card.green::before{background:var(--success)}
.stat-card.amber::before{background:var(--warning)}
.stat-card.red::before{background:var(--error)}
.stat-label{font-size:var(--fs-tiny);color:var(--text-light);letter-spacing:0.06em;font-family:var(--mono);text-transform:uppercase;margin-bottom:8px}
.stat-value{font-size:28px;font-weight:700;line-height:1;color:var(--text-main);letter-spacing:-0.02em;display:flex;align-items:baseline;gap:6px}
.stat-value .unit{font-size:12px;font-weight:400;color:var(--text-light)}
.stat-sub{font-size:var(--fs-small);color:var(--text-light);margin-top:6px}
.stat-trend.up{color:var(--success)}.stat-trend.down{color:var(--error)}

/* ===== WORKBENCH ===== */
.wb-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:14px;margin-bottom:16px}
.wb-todos{display:flex;flex-direction:column;gap:10px}
.wb-todo{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;display:flex;align-items:center;gap:14px;transition:var(--t);cursor:pointer;box-shadow:var(--shadow-xs)}
.wb-todo:hover{transform:translateX(2px);border-color:var(--primary);box-shadow:var(--shadow-sm)}
.wb-todo-icon{width:36px;height:36px;border-radius:var(--r-sm);display:grid;place-items:center;flex-shrink:0;font-size:16px}
.wb-todo-info{flex:1}
.wb-todo-info .lbl{font-size:var(--fs-body);font-weight:600;color:var(--text-main)}
.wb-todo-info .cnt{font-size:var(--fs-small);color:var(--text-light);margin-top:2px}
.wb-todo-info .cnt em{font-style:normal;color:var(--error);font-weight:700}
.wb-todo-arrow{color:var(--text-light);font-size:14px}
.wb-todo:hover .wb-todo-arrow{color:var(--primary)}

.activity-list{display:flex;flex-direction:column;gap:2px}
.activity-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-sm);font-size:var(--fs-body);color:var(--text-secondary);border-left:3px solid transparent;transition:var(--t)}
.activity-item:hover{background:var(--bg-hover);border-left-color:var(--primary)}
.activity-time{font-size:10px;color:var(--text-light);font-family:var(--mono);min-width:38px}
.activity-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.activity-text{flex:1;line-height:1.5}
.activity-text strong{color:var(--text-main);font-weight:600}

/* ===== PIPELINE ===== */
.pipeline-flow{display:flex;align-items:center;justify-content:space-between;gap:8px}
.pipe-node{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.pipe-icon{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;border:2px solid var(--border-strong);background:var(--bg-elevated);font-size:16px;color:var(--text-light);transition:var(--t)}
.pipe-node.done .pipe-icon{border-color:var(--success);background:var(--success-subtle);color:var(--success)}
.pipe-node.active .pipe-icon{border-color:var(--primary);background:var(--primary-subtle);color:var(--primary);animation:pulseNode 2s ease-in-out infinite;box-shadow:0 0 0 4px rgba(26,111,212,0.08)}
@keyframes pulseNode{0%,100%{box-shadow:0 0 0 4px rgba(26,111,212,0.08)}50%{box-shadow:0 0 0 8px rgba(26,111,212,0.04)}}
.pipe-label{font-size:var(--fs-small);color:var(--text-secondary);font-weight:500;text-align:center}
.pipe-node.active .pipe-label{color:var(--primary);font-weight:600}
.pipe-node.done .pipe-label{color:var(--success)}
.pipe-count{font-family:var(--mono);font-size:10px;background:var(--bg-elevated);padding:1px 8px;border-radius:9px;color:var(--text-secondary)}
.pipe-line{flex:0 0 32px;height:2px;background:var(--border-strong);position:relative}
.pipe-line.done{background:var(--success)}
.pipe-line.active{background:linear-gradient(90deg,var(--success),var(--primary));overflow:hidden}
.pipe-line.active::after{content:'';position:absolute;left:-10px;top:0;width:10px;height:100%;background:rgba(255,255,255,0.6);animation:flow 1.5s linear infinite}
@keyframes flow{0%{left:-10px}100%{left:100%}}

/* ===== TABLE ===== */
.tbl-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;box-shadow:var(--shadow-xs)}
.tbl-toolbar{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tbl-toolbar .label{font-size:var(--fs-small);color:var(--text-light);margin-right:auto}
.tbl-toolbar .label b{color:var(--text-main);font-weight:700}
table{width:100%;border-collapse:collapse;font-size:var(--fs-body)}
thead th{padding:9px 14px;text-align:left;font-size:var(--fs-tiny);font-family:var(--mono);letter-spacing:0.08em;color:var(--text-light);text-transform:uppercase;font-weight:500;background:var(--bg-elevated);border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s;cursor:pointer}
tbody tr:hover{background:var(--bg-hover)}
tbody tr:last-child{border-bottom:none}
tbody td{padding:11px 14px;color:var(--text-secondary)}
td.id{font-family:var(--mono);font-size:var(--fs-small);color:var(--primary);font-weight:500}
td.main{color:var(--text-main)}
.checkbox{width:14px;height:14px;cursor:pointer;accent-color:var(--primary)}

/* ===== GENERATE PAGE ===== */
.gen-grid{display:grid;grid-template-columns:280px 1fr;gap:14px;margin-bottom:16px}
.gen-context{background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--primary);border-radius:var(--r-md);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.gen-context .ctx-label{font-size:var(--fs-tiny);color:var(--text-light);font-family:var(--mono);letter-spacing:0.1em}
.gen-context .ctx-pill{font-size:var(--fs-small);padding:3px 10px;background:var(--primary-subtle);color:var(--primary);border-radius:12px;font-weight:600}
.gen-context .ctx-link{font-size:var(--fs-small);color:var(--primary);text-decoration:none;cursor:pointer}
.gen-context .ctx-link:hover{text-decoration:underline}

.module-list{display:flex;flex-direction:column;gap:6px}
.mod-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg-elevated);cursor:pointer;transition:var(--t)}
.mod-item:hover{border-color:var(--primary);background:var(--primary-subtle)}
.mod-item.selected{border-color:var(--primary);background:var(--primary-subtle)}
.mod-item.auto{border-style:dashed;border-color:var(--primary)}
.mod-cb{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border-strong);display:grid;place-items:center;flex-shrink:0;background:#fff}
.mod-item.selected .mod-cb{background:var(--primary);border-color:var(--primary);color:#fff;font-size:9px}
.mod-name{font-size:var(--fs-body);font-weight:500;flex:1;color:var(--text-main)}
.mod-count{font-family:var(--mono);font-size:10px;color:var(--text-light)}
.mod-auto-flag{font-size:9px;color:var(--primary);background:var(--primary-subtle);padding:0 6px;border-radius:8px;font-family:var(--mono);letter-spacing:0.05em}

.dstream-summary{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:14px;flex-wrap:wrap}
.ds-input{font-size:var(--fs-small);color:var(--text-secondary)}
.ds-input b{color:var(--text-main);font-weight:700;margin-right:3px}
.ds-arrow{color:var(--text-light)}
.ds-chip{font-size:var(--fs-small);padding:3px 10px;border-radius:12px;font-weight:500;cursor:pointer;transition:var(--t)}
.ds-chip b{font-weight:700;margin-right:3px}
.ds-chip:hover{transform:translateY(-1px)}
.ds-chip.exact{background:var(--success-subtle);color:var(--success)}
.ds-chip.partial{background:var(--primary-subtle);color:var(--primary)}
.ds-chip.new{background:var(--warning-subtle);color:var(--warning)}
.ds-chip.cross{background:rgba(124,58,237,0.1);color:#7c3aed}
.ds-chip.clarify{background:var(--error-subtle);color:var(--error)}

.tc-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tc-card{background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--success);border-radius:var(--r-md);padding:14px;transition:var(--t);position:relative;box-shadow:var(--shadow-xs);cursor:pointer}
.tc-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.tc-card.mid{border-left-color:var(--warning)}
.tc-card.low{border-left-color:var(--error)}
.tc-top{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.tc-id{font-family:var(--mono);font-size:var(--fs-small);color:var(--primary);background:var(--primary-subtle);padding:2px 8px;border-radius:4px;font-weight:600}
.tc-conf{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:auto}
.tc-conf.high{background:var(--success-subtle);color:var(--success)}
.tc-conf.mid{background:var(--warning-subtle);color:var(--warning)}
.tc-conf.low{background:var(--error-subtle);color:var(--error)}
.tc-scene{font-size:var(--fs-body);color:var(--text-main);line-height:1.5;font-weight:500;margin-bottom:10px}
.tc-trace{font-size:var(--fs-small);color:var(--text-light);padding:8px 10px;background:var(--bg-elevated);border-radius:var(--r-sm);margin-bottom:10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tc-trace .tlabel{font-family:var(--mono);font-size:10px;letter-spacing:0.08em;color:var(--text-light);text-transform:uppercase}
.tc-trace a{color:var(--primary);text-decoration:none;font-family:var(--mono);font-size:10px;font-weight:600}
.tc-trace a:hover{text-decoration:underline}
.tc-actions{display:flex;gap:6px;padding-top:10px;border-top:1px solid var(--border)}
.tc-actions .btn-sm{flex:1}

/* ===== REVIEW (KPI) ===== */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.kpi{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:18px 20px;position:relative;overflow:hidden;box-shadow:var(--shadow-xs)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--primary)}
.kpi.green::before{background:var(--success)}.kpi.amber::before{background:var(--warning)}.kpi.red::before{background:var(--error)}
.kpi-label{font-size:var(--fs-tiny);color:var(--text-light);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.kpi-value{font-size:32px;font-weight:700;line-height:1;color:var(--text-main)}
.kpi.green .kpi-value{color:var(--success)}.kpi.amber .kpi-value{color:var(--warning)}.kpi.red .kpi-value{color:var(--error)}
.kpi-sub{font-size:var(--fs-small);color:var(--text-light);margin-top:6px}

.tc-eval-row{cursor:pointer}
.tc-eval-row td{vertical-align:middle}
.conf-badge{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block}
.conf-badge.high{background:var(--success-subtle);color:var(--success)}
.conf-badge.mid{background:var(--warning-subtle);color:var(--warning)}
.conf-badge.low{background:var(--error-subtle);color:var(--error)}
.action-cell{font-size:var(--fs-small);font-weight:600;display:flex;gap:6px}

/* ===== DRAWER ===== */
.overlay{position:fixed;inset:0;background:rgba(15,30,45,0.3);z-index:200;display:none}
.overlay.open{display:block}
.drawer{position:fixed;top:0;right:-520px;width:520px;max-width:calc(100vw - 60px);height:100vh;background:var(--bg-card);border-left:1px solid var(--border);z-index:201;display:flex;flex-direction:column;transition:right 0.3s cubic-bezier(0.4,0,0.2,1);overflow:hidden;box-shadow:-8px 0 24px rgba(15,30,45,0.1)}
.drawer.open{right:0}
.dr-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.dr-head .tc-id{flex-shrink:0}
.dr-title{font-size:var(--fs-h3);font-weight:600;flex:1}
.dr-close{background:none;border:none;color:var(--text-light);font-size:18px;padding:0 6px}
.dr-close:hover{color:var(--text-main)}
.dr-body{flex:1;overflow-y:auto;padding:18px 20px}
.dr-section{margin-bottom:18px}
.dr-section h4{font-size:var(--fs-tiny);color:var(--text-light);letter-spacing:0.1em;font-family:var(--mono);text-transform:uppercase;margin-bottom:8px}
.dr-section p{font-size:var(--fs-body);color:var(--text-main);line-height:1.6}
.dr-trace{display:flex;flex-direction:column;gap:6px;padding:10px 12px;background:var(--bg-elevated);border-radius:var(--r-sm);font-size:var(--fs-small)}
.dr-trace-line{display:flex;align-items:center;gap:8px}
.dr-trace-line .tag{flex-shrink:0}
.dr-trace-line a{color:var(--primary);text-decoration:none;font-family:var(--mono);font-size:11px;font-weight:600}
.dr-trace-line a:hover{text-decoration:underline}
.dr-actions{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}

/* ===== REPORT ===== */
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.next-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.next-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;transition:var(--t);cursor:pointer;box-shadow:var(--shadow-xs)}
.next-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--primary)}
.next-icon{width:36px;height:36px;border-radius:8px;background:var(--primary-subtle);color:var(--primary);display:grid;place-items:center;font-size:16px;margin-bottom:10px}
.next-title{font-size:var(--fs-body);font-weight:600;color:var(--text-main);margin-bottom:4px}
.next-desc{font-size:var(--fs-small);color:var(--text-light);line-height:1.5}

/* ===== TOAST ===== */
.toast{position:fixed;top:20px;right:20px;z-index:999;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 14px;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:8px;transform:translateX(120%);transition:transform 0.3s ease;font-size:var(--fs-body)}
.toast.show{transform:translateX(0)}
.toast.success{border-left:3px solid var(--success)}
.toast.error{border-left:3px solid var(--error)}

/* ===== BAR CHART ===== */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:120px;padding:8px 0}
.bar-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
.bar{width:100%;max-width:32px;border-radius:3px 3px 0 0;background:linear-gradient(180deg,#3a87e0,var(--primary));min-height:4px;transition:var(--t)}
.bar.green{background:linear-gradient(180deg,#34b77d,var(--success))}
.bar.amber{background:linear-gradient(180deg,#e0a23c,var(--warning))}
.bar.red{background:linear-gradient(180deg,#e85a4e,var(--error))}
.bar-val{font-size:10px;color:var(--text-secondary);font-weight:600;font-family:var(--mono)}
.bar-lbl{font-size:10px;color:var(--text-light);text-align:center;white-space:nowrap}

.donut{display:flex;align-items:center;gap:14px}
.donut-svg{width:120px;height:120px;flex-shrink:0}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:6px;font-size:var(--fs-small)}
.donut-legend-item{display:flex;align-items:center;gap:8px}
.donut-legend-item .ldot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.donut-legend-item .lname{flex:1;color:var(--text-secondary)}
.donut-legend-item .lval{font-family:var(--mono);font-weight:600;color:var(--text-main)}

</style>
</head>
